<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Forgot License Key - Quiz Answer Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 500px; width: 100%; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    h1 { color: #333; margin-bottom: 10px; font-size: 28px; text-align: center; }
    .subtitle { color: #666; margin-bottom: 30px; font-size: 16px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    label { display: block; color: #333; font-weight: bold; margin-bottom: 8px; }
    input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; }
    input:focus { outline: none; border-color: #4CAF50; }
    .submit-button { width: 100%; background: #4CAF50; color: white; padding: 15px; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
    .submit-button:hover { background: #45a049; }
    .submit-button:disabled { background: #ccc; cursor: not-allowed; }
    .message { padding: 15px; border-radius: 6px; margin-top: 20px; display: none; }
    .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .message.show { display: block; }
    .license-result { background: #e7f3ff; padding: 20px; border-radius: 8px; margin-top: 20px; display: none; }
    .license-result.show { display: block; }
    .license-key { font-size: 20px; font-weight: bold; color: #333; letter-spacing: 2px; margin: 15px 0; text-align: center; }
    .copy-button { background: #2196F3; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
    .copy-button:hover { background: #0b7dda; }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: #4CAF50; text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔑 Forgot License Key?</h1>
    <p class="subtitle">Enter your email to retrieve your license key</p>
    
    <form id="forgotForm" onsubmit="retrieveLicense(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter the email you used during purchase" required>
      </div>
      
      <button type="submit" class="submit-button" id="submitBtn">Retrieve License Key</button>
    </form>
    
    <div id="message" class="message"></div>
    
    <div id="licenseResult" class="license-result">
      <p style="color: #666; margin-bottom: 10px;">Your license key:</p>
      <div class="license-key" id="licenseKeyDisplay"></div>
      <button class="copy-button" onclick="copyLicenseKey()">📋 Copy License Key</button>
      <p style="color: #666; font-size: 14px; margin-top: 15px; text-align: center;">
        Expiry: <strong id="expiryDisplay"></strong>
      </p>
    </div>
    
    <div class="back-link">
      <a href="/purchase">← Back to Purchase Page</a>
    </div>
  </div>

  <script>
    async function retrieveLicense(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const submitBtn = document.getElementById('submitBtn');
      const message = document.getElementById('message');
      const licenseResult = document.getElementById('licenseResult');
      
      // Reset UI
      message.classList.remove('show', 'success', 'error');
      licenseResult.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Searching...';
      
      try {
        const response = await fetch('/api/retrieve-license', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const result = await response.json();
        
        if (result.success) {
          // Show license key
          document.getElementById('licenseKeyDisplay').textContent = result.licenseKey;
          document.getElementById('expiryDisplay').textContent = new Date(result.expiryDate).toLocaleDateString();
          licenseResult.classList.add('show');
          
          message.textContent = '✅ License key found!';
          message.classList.add('success', 'show');
        } else {
          message.textContent = '❌ ' + result.message;
          message.classList.add('error', 'show');
        }
      } catch (error) {
        console.error('Error:', error);
        message.textContent = '❌ Error retrieving license. Please try again.';
        message.classList.add('error', 'show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Retrieve License Key';
      }
    }
    
    function copyLicenseKey() {
      const licenseKey = document.getElementById('licenseKeyDisplay').textContent;
      navigator.clipboard.writeText(licenseKey).then(() => {
        alert('License key copied to clipboard!');
      });
    }
  </script>
</body>
</html>
