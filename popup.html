<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    .container {
      display: none;
    }
    .container.active {
      display: block;
    }
    h3 {
      margin: 0 0 15px 0;
      color: #333;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    button:hover {
      background: #45a049;
    }
    button.logout {
      background: #f44336;
      margin-top: 10px;
    }
    button.logout:hover {
      background: #da190b;
    }
    button.purchase {
      background: #2196F3;
      margin-top: 10px;
    }
    button.purchase:hover {
      background: #0b7dda;
    }
    .link-text {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
    }
    .link-text a {
      color: #4CAF50;
      text-decoration: none;
    }
    .link-text a:hover {
      text-decoration: underline;
    }
    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      text-align: center;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    .info {
      background: #e7f3ff;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 13px;
      color: #004085;
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="container active">
    <h3>🔐 Login Required</h3>
    <div class="info">Enter your license key to activate the extension</div>
    <input type="text" id="licenseKey" placeholder="Enter License Key">
    <button id="loginBtn">Activate</button>
    <button class="purchase" onclick="window.open('https://extension-kiek.onrender.com/purchase', '_blank')">
      💳 Get License Key
    </button>
    <div class="status" id="loginStatus"></div>
    <div class="link-text">
      <a href="https://extension-kiek.onrender.com/forgot-license" target="_blank">
        Forgot your license key?
      </a>
    </div>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboardScreen" class="container">
    <h3>✅ Extension Activated</h3>
    <div class="info">
      <strong>Plan:</strong> <span id="userPlan">-</span><br>
      <strong>User:</strong> <span id="userEmail">-</span><br>
      <span id="expiryInfo" style="font-size: 12px;">-</span>
    </div>
    <p style="font-size: 13px; color: #666;">
      Select any question text on a webpage to get instant answers!
    </p>
    <button class="logout" id="logoutBtn">Logout</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
